name: Nightly
'on':
  schedule:
  - cron: 0 2 * * *
jobs:
  policy-stress-test:
    name: Start Nightly Policy Stress tests
    if: github.repository == 'cilium/cilium'
    runs-on: ubuntu-latest
    steps:
    - name: Request GKE test cluster
      uses: docker://quay.io/isovalent/gke-test-cluster-requester:fe34abda190c31680968ba62634c788428d91706
      env:
        GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: --namespace=test-clusters --image=quay.io/cilium/cilium-test-ci:${{
          github.sha }} "/usr/local/bin/cilium-test-gke.sh" "quay.io/cilium/cilium-ci:${{
          github.sha }}" "quay.io/cilium/operator-generic-ci:${{ github.sha }}" "quay.io/cilium/hubble-relay-ci:${{
          github.sha }}" "NightlyPolicyStress"
  baseline-test:
    name: Start performance test
    if: github.repository == 'cilium/cilium'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Add namespace object
      run: "cat <<EOT > cilium.yaml\napiVersion: v1\nkind: Namespace\nmetadata:\n\
        \  name: cilium-perf\n---\nEOT\n"
    - name: Generate Cilium manifests
      run: "helm template cilium ./install/kubernetes/cilium \\\n  --namespace cilium-perf\
        \ \\\n  --set enableCriticalPriorityClass=false \\\n  --set nodeinit.enabled=true\
        \ \\\n  --set nodeinit.reconfigureKubelet=true \\\n  --set nodeinit.removeCbrBridge=true\
        \ \\\n  --set cni.binPath=/home/kubernetes/bin \\\n  --set gke.enabled=true\
        \ \\\n  --set ipam.mode=kubernetes \\\n  --set nodeinit.restartPods=true \\\
        \n  --set hubble.enabled=true \\\n  --set prometheus.enabled=true \\\n  --set\
        \ operator.prometheus.enabled=true \\\n  --set hubble.metrics.enabled=\"{dns,drop,tcp,flow,port-distribution,icmp,http}\"\
        \ \\\n  --set nativeRoutingCIDR=NATIVE_CIDR_PLACEHOLDER \\\n  | tee -a cilium.yaml\n"
    - name: Request GKE test cluster
      uses: docker://quay.io/isovalent/gke-test-cluster-requester:fe34abda190c31680968ba62634c788428d91706
      env:
        GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: --namespace=test-clusters --init-manifest=cilium.yaml --image=cilium/cilium-perf-test:8cfdbfe
          "/usr/local/bin/run_in_test_cluster.sh" "--prom-name=prom" "--prom-ns=prom"
          "--duration=30m" "--manifest-path=/go/src/github.com/cilium/cilium-perf-test/1.8/manifests/"
